<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Travel Planning ✈️</title>
  <meta name="description" content="Browse trip itineraries." />
  <style>
    :root {
      --bg: #f6f7fb;
      --bg-elev: #ffffff;
      --bg-soft: #eef0f7;
      --text: #1a1c25;
      --text-soft: #5b6072;
      --text-faint: #8b90a3;
      --border: #e4e7f0;
      --border-strong: #d3d7e4;
      --accent: #7c5cff;
      --accent-ink: #ffffff;
      --shadow: 0 1px 2px rgba(20,22,40,.06), 0 8px 24px rgba(20,22,40,.06);
      --shadow-lg: 0 4px 12px rgba(20,22,40,.10), 0 24px 48px rgba(20,22,40,.12);
      --radius: 16px;
      --radius-sm: 10px;
      --maxw: 1080px;
      --ok: #17b26a;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji", sans-serif;
    }
    :root[data-theme="dark"] {
      --bg: #0e0f16;
      --bg-elev: #171922;
      --bg-soft: #1e202c;
      --text: #edeef4;
      --text-soft: #a6abbd;
      --text-faint: #6c7185;
      --border: #262936;
      --border-strong: #333747;
      --accent: #9d84ff;
      --accent-ink: #14121f;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.3);
      --shadow-lg: 0 4px 12px rgba(0,0,0,.5), 0 24px 48px rgba(0,0,0,.45);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #0e0f16; --bg-elev: #171922; --bg-soft: #1e202c;
        --text: #edeef4; --text-soft: #a6abbd; --text-faint: #6c7185;
        --border: #262936; --border-strong: #333747;
        --accent: #9d84ff; --accent-ink: #14121f;
        --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.3);
        --shadow-lg: 0 4px 12px rgba(0,0,0,.5), 0 24px 48px rgba(0,0,0,.45);
      }
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0; font-family: var(--font); background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased; line-height: 1.6;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ---------- Top bar ---------- */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      backdrop-filter: saturate(1.4) blur(12px);
      background: color-mix(in srgb, var(--bg) 78%, transparent);
      border-bottom: 1px solid var(--border);
    }
    .topbar-inner {
      max-width: var(--maxw); margin: 0 auto; padding: 12px 20px;
      display: flex; align-items: center; gap: 14px;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; letter-spacing: -.02em; cursor: pointer; }
    .brand .globe { font-size: 20px; }
    .brand:hover { text-decoration: none; }
    .spacer { flex: 1; }
    .iconbtn {
      appearance: none; border: 1px solid var(--border-strong); background: var(--bg-elev);
      color: var(--text); width: 38px; height: 38px; border-radius: 10px; cursor: pointer;
      display: grid; place-items: center; font-size: 16px; transition: transform .12s, background .2s;
    }
    .iconbtn:hover { background: var(--bg-soft); transform: translateY(-1px); }
    .backbtn {
      appearance: none; border: 1px solid var(--border-strong); background: var(--bg-elev);
      color: var(--text-soft); height: 38px; padding: 0 14px; border-radius: 10px; cursor: pointer;
      font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px;
      transition: background .2s, color .2s;
    }
    .backbtn:hover { background: var(--bg-soft); color: var(--text); }

    /* ---------- Layout ---------- */
    .wrap { max-width: var(--maxw); margin: 0 auto; padding: 28px 20px 80px; }

    /* ---------- Home hero ---------- */
    .hero { padding: 26px 0 22px; }
    .hero h1 { font-size: clamp(30px, 5vw, 44px); margin: 0 0 8px; letter-spacing: -.03em; }
    .hero p { color: var(--text-soft); font-size: 17px; margin: 0; }
    .search {
      margin-top: 22px; display: flex; align-items: center; gap: 10px;
      background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px;
      padding: 10px 14px; max-width: 420px; box-shadow: var(--shadow);
    }
    .search input { border: 0; background: transparent; outline: none; color: var(--text); font-size: 15px; width: 100%; font-family: var(--font); }
    .search .mag { color: var(--text-faint); }

    /* ---------- Trip cards ---------- */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 26px; }
    .card {
      background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; cursor: pointer; box-shadow: var(--shadow);
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s;
      display: flex; flex-direction: column;
    }
    .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--border-strong); }
    .card-banner {
      height: 118px; position: relative; display: flex; align-items: flex-end; justify-content: space-between;
      padding: 14px 16px; color: #fff;
    }
    .card-banner::after {
      content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(0,0,0,.28));
    }
    .card-emoji { font-size: 40px; position: relative; z-index: 1; filter: drop-shadow(0 2px 6px rgba(0,0,0,.3)); }
    .card-flags { position: relative; z-index: 1; font-size: 22px; letter-spacing: 2px; }
    .status-chip {
      position: absolute; top: 12px; right: 14px; z-index: 1;
      background: rgba(255,255,255,.9); color: #1a1c25; font-size: 11px; font-weight: 700;
      padding: 4px 9px; border-radius: 99px; letter-spacing: .02em; text-transform: uppercase;
    }
    .card-body { padding: 16px 18px 18px; }
    .card-title { font-size: 20px; font-weight: 700; letter-spacing: -.02em; margin: 0; }
    .card-sub { color: var(--text-faint); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-top: 2px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; font-weight: 600;
      background: var(--bg-soft); color: var(--text-soft); padding: 5px 10px; border-radius: 8px;
    }
    .empty { color: var(--text-faint); text-align: center; padding: 60px 0; }

    /* ---------- Reader ---------- */
    .reader-head { margin-bottom: 8px; }
    .reader-title { font-size: clamp(26px, 4vw, 36px); letter-spacing: -.03em; margin: 6px 0 4px; }
    .reader-meta { color: var(--text-soft); font-size: 14px; display: flex; flex-wrap: wrap; gap: 6px 14px; }
    .tabs { display: flex; gap: 6px; margin: 20px 0 8px; border-bottom: 1px solid var(--border); }
    .tab {
      appearance: none; border: 0; background: transparent; cursor: pointer;
      padding: 10px 14px; font-size: 14.5px; font-weight: 600; color: var(--text-soft);
      border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: var(--font);
      transition: color .15s, border-color .15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .reader-layout { display: grid; grid-template-columns: 220px 1fr; gap: 40px; margin-top: 24px; align-items: start; }
    .toc { position: sticky; top: 78px; font-size: 13.5px; max-height: calc(100vh - 100px); overflow: auto; }
    .toc-title { text-transform: uppercase; letter-spacing: .06em; font-size: 11px; font-weight: 700; color: var(--text-faint); margin-bottom: 10px; }
    .toc a { display: block; padding: 4px 0 4px 12px; color: var(--text-soft); border-left: 2px solid var(--border); line-height: 1.35; }
    .toc a:hover { color: var(--text); text-decoration: none; border-left-color: var(--border-strong); }
    .toc a.h3 { padding-left: 24px; font-size: 12.5px; color: var(--text-faint); }
    .toc a.active { color: var(--accent); border-left-color: var(--accent); font-weight: 600; }

    /* progress bar for checkbox docs */
    .progress-wrap { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 20px; box-shadow: var(--shadow); }
    .progress-top { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; color: var(--text-soft); margin-bottom: 8px; }
    .progress-bar { height: 8px; background: var(--bg-soft); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #ff5c8a); border-radius: 99px; transition: width .4s ease; }

    /* ---------- Markdown content ---------- */
    .md { min-width: 0; font-size: 16px; }
    .md h1 { font-size: 30px; letter-spacing: -.03em; margin: 8px 0 14px; }
    .md h2 { font-size: 23px; letter-spacing: -.02em; margin: 40px 0 12px; padding-top: 8px; border-top: 1px solid var(--border); }
    .md h2:first-of-type { border-top: 0; margin-top: 8px; }
    .md h3 { font-size: 18.5px; margin: 26px 0 8px; }
    .md p { margin: 12px 0; }
    .md ul, .md ol { padding-left: 22px; margin: 12px 0; }
    .md li { margin: 5px 0; }
    .md li::marker { color: var(--text-faint); }
    .md a { font-weight: 500; text-decoration: underline; text-underline-offset: 2px; text-decoration-color: color-mix(in srgb, var(--accent) 40%, transparent); }
    .md strong { color: var(--text); font-weight: 700; }
    .md hr { border: 0; border-top: 1px solid var(--border); margin: 28px 0; }
    .md blockquote {
      margin: 16px 0; padding: 10px 16px; border-left: 3px solid var(--accent);
      background: var(--bg-soft); border-radius: 0 8px 8px 0; color: var(--text-soft);
    }
    .md blockquote p { margin: 4px 0; }
    .md code {
      background: var(--bg-soft); padding: 2px 6px; border-radius: 6px; font-size: .88em;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }
    .md pre { background: var(--bg-soft); padding: 14px 16px; border-radius: 10px; overflow-x: auto; border: 1px solid var(--border); }
    .md pre code { background: none; padding: 0; }
    .table-scroll { overflow-x: auto; margin: 16px 0; border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); }
    .md table { border-collapse: collapse; width: 100%; font-size: 14.5px; }
    .md thead th { background: var(--bg-soft); text-align: left; font-weight: 700; }
    .md th, .md td { padding: 10px 14px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    .md tbody tr:last-child td { border-bottom: 0; }
    .md tbody tr:hover td { background: color-mix(in srgb, var(--accent) 6%, transparent); }
    /* task lists */
    .md li:has(input[type=checkbox]) { list-style: none; margin-left: -22px; padding-left: 0; display: flex; align-items: flex-start; gap: 9px; }
    .md input[type=checkbox] { margin-top: 5px; width: 16px; height: 16px; accent-color: var(--accent); flex: none; }
    .md li:has(input:checked) { color: var(--text-faint); text-decoration: line-through; }

    .loading { color: var(--text-faint); padding: 40px 0; text-align: center; }

    @media (max-width: 820px) {
      .reader-layout { grid-template-columns: 1fr; gap: 0; }
      .toc { display: none; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand" id="brand"><span class="globe">✈️</span><span id="brandText">Travel Planning</span></div>
      <div class="spacer"></div>
      <button class="iconbtn" id="themeBtn" title="Toggle theme" aria-label="Toggle theme">🌙</button>
    </div>
  </header>

  <main class="wrap" id="app"><div class="loading">Loading…</div></main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const app = document.getElementById('app');
    const brandText = document.getElementById('brandText');
    let DATA = null;

    /* ---------- Theme ---------- */
    const themeBtn = document.getElementById('themeBtn');
    function currentTheme() {
      const explicit = document.documentElement.getAttribute('data-theme');
      if (explicit) return explicit;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
      try { localStorage.setItem('tp-theme', t); } catch (e) {}
    }
    themeBtn.addEventListener('click', () => applyTheme(currentTheme() === 'dark' ? 'light' : 'dark'));
    (function initTheme() {
      let saved = null;
      try { saved = localStorage.getItem('tp-theme'); } catch (e) {}
      if (saved) applyTheme(saved);
      else themeBtn.textContent = currentTheme() === 'dark' ? '☀️' : '🌙';
    })();

    /* ---------- Helpers ---------- */
    const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const slug = s => s.toLowerCase().replace(/[^\w\s-]/g, '').trim().replace(/\s+/g, '-');

    function tripById(id) { return DATA.trips.find(t => t.id === id); }

    /* ---------- Home ---------- */
    function renderHome(filter = '') {
      brandText.textContent = DATA.site?.title || 'Travel Planning';
      const q = filter.toLowerCase();
      const trips = DATA.trips.filter(t =>
        !q || (t.title + ' ' + (t.subtitle||'') + ' ' + t.dates).toLowerCase().includes(q));
      const cards = trips.map(t => {
        const g = t.gradient || ['#7c5cff', '#ff5c8a'];
        return `
        <div class="card" onclick="location.hash='#/trip/${t.id}'">
          <div class="card-banner" style="background:linear-gradient(135deg, ${g[0]}, ${g[1]})">
            <span class="card-emoji">${t.emoji || '🧳'}</span>
            <span class="card-flags">${t.flags || ''}</span>
            ${t.status ? `<span class="status-chip">${esc(t.status)}</span>` : ''}
          </div>
          <div class="card-body">
            <h3 class="card-title">${esc(t.title)}</h3>
            ${t.subtitle ? `<div class="card-sub">${esc(t.subtitle)}</div>` : ''}
            <div class="chips">
              <span class="chip">📅 ${esc(t.dates)}</span>
              ${t.nights ? `<span class="chip">🌙 ${t.nights} nights</span>` : ''}
              ${t.travelers ? `<span class="chip">👥 ${t.travelers}</span>` : ''}
              ${t.budget ? `<span class="chip">💷 ${esc(t.budget)}</span>` : ''}
            </div>
          </div>
        </div>`;
      }).join('');
      app.innerHTML = `
        <section class="hero">
          <h1>${esc(DATA.site?.title || 'Travel Planning')}</h1>
          <p>${esc(DATA.site?.tagline || '')}</p>
          <div class="search">
            <span class="mag">🔎</span>
            <input id="searchInput" placeholder="Search trips…" value="${esc(filter)}" />
          </div>
        </section>
        ${trips.length ? `<div class="grid">${cards}</div>` : `<div class="empty">No trips match “${esc(filter)}”.</div>`}
      `;
      const si = document.getElementById('searchInput');
      si.addEventListener('input', e => renderHome(e.target.value));
      si.focus();
      si.setSelectionRange(si.value.length, si.value.length);
    }

    /* ---------- Reader ---------- */
    async function renderTrip(id, docIndex = 0) {
      const t = tripById(id);
      if (!t) { app.innerHTML = `<div class="empty">Trip not found. <a href="#/">Back home</a></div>`; return; }
      brandText.textContent = t.title;
      docIndex = Math.max(0, Math.min(docIndex, t.docs.length - 1));
      const doc = t.docs[docIndex];

      app.innerHTML = `
        <button class="backbtn" onclick="location.hash='#/'">← All trips</button>
        <div class="reader-head">
          <h1 class="reader-title">${t.emoji || ''} ${esc(t.title)}</h1>
          <div class="reader-meta">
            <span>${t.flags || ''}</span><span>📅 ${esc(t.dates)}</span>
            ${t.travelers ? `<span>👥 ${t.travelers} travelers</span>` : ''}
            ${t.budget ? `<span>💷 ${esc(t.budget)}</span>` : ''}
          </div>
        </div>
        <div class="tabs">
          ${t.docs.map((d, i) => `<button class="tab ${i===docIndex?'active':''}" onclick="location.hash='#/trip/${id}/${i}'">${esc(d.label)}</button>`).join('')}
        </div>
        <div class="reader-layout">
          <nav class="toc" id="toc"></nav>
          <div class="md" id="content"><div class="loading">Loading ${esc(doc.label)}…</div></div>
        </div>`;

      const content = document.getElementById('content');
      let md;
      try {
        const res = await fetch(doc.file + '?v=' + Date.now());
        if (!res.ok) throw new Error(res.status);
        md = await res.text();
      } catch (e) {
        content.innerHTML = `<div class="empty">Couldn't load <code>${esc(doc.file)}</code> (${esc(e.message)}).</div>`;
        return;
      }

      marked.setOptions({ gfm: true, breaks: false });
      content.innerHTML = marked.parse(md);

      // wrap tables for horizontal scroll
      content.querySelectorAll('table').forEach(tbl => {
        const w = document.createElement('div'); w.className = 'table-scroll';
        tbl.parentNode.insertBefore(w, tbl); w.appendChild(tbl);
      });

      // booking progress from checkboxes
      const boxes = content.querySelectorAll('input[type=checkbox]');
      if (boxes.length >= 3) {
        const done = [...boxes].filter(b => b.checked).length;
        const pct = Math.round(done / boxes.length * 100);
        const pw = document.createElement('div');
        pw.className = 'progress-wrap';
        pw.innerHTML = `<div class="progress-top"><span>✅ Checklist progress</span><span>${done}/${boxes.length}</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
        content.prepend(pw);
      }

      // headings → ids + TOC
      const heads = content.querySelectorAll('h2, h3');
      const toc = document.getElementById('toc');
      const seen = {};
      const items = [];
      heads.forEach(h => {
        let id = slug(h.textContent);
        if (seen[id] != null) { seen[id]++; id = id + '-' + seen[id]; } else seen[id] = 0;
        h.id = id;
        items.push(`<a href="#${id}" class="${h.tagName === 'H3' ? 'h3' : ''}" data-id="${id}">${esc(h.textContent)}</a>`);
      });
      if (items.length) toc.innerHTML = `<div class="toc-title">On this page</div>${items.join('')}`;

      // in-page anchor clicks shouldn't nuke the route hash
      toc.querySelectorAll('a').forEach(a => a.addEventListener('click', ev => {
        ev.preventDefault();
        document.getElementById(a.dataset.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }));

      // scroll-spy
      const spy = new IntersectionObserver(entries => {
        entries.forEach(en => {
          if (en.isIntersecting) {
            toc.querySelectorAll('a').forEach(a => a.classList.toggle('active', a.dataset.id === en.target.id));
          }
        });
      }, { rootMargin: '-80px 0px -70% 0px' });
      heads.forEach(h => spy.observe(h));
      window.scrollTo(0, 0);
    }

    /* ---------- Router ---------- */
    function route() {
      const h = location.hash.replace(/^#\/?/, '');
      const parts = h.split('/').filter(Boolean);
      if (parts[0] === 'trip' && parts[1]) renderTrip(parts[1], parseInt(parts[2] || '0', 10));
      else renderHome();
    }
    window.addEventListener('hashchange', route);
    document.getElementById('brand').addEventListener('click', () => location.hash = '#/');

    /* ---------- Boot ---------- */
    (async function boot() {
      try {
        const res = await fetch('trips.json?v=' + Date.now());
        DATA = await res.json();
      } catch (e) {
        app.innerHTML = `<div class="empty">Couldn't load <code>trips.json</code>.</div>`;
        return;
      }
      route();
    })();
  </script>
</body>
</html>
